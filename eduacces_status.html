body{background:#f0ede8;color:#1c1814}

.kpi-n{font-size:28px;font-weight:900;line-height:1}

.ctrl{padding:12px 16px;background:#fff;border-bottom:1px solid #ddd8d0;display:flex;align-items:center;gap:8px;flex-wrap:wrap}

.rc{font-size:12px;color:#8a8078;margin-left:auto;white-space:nowrap;font-weight:600}
.sr{padding:8px 16px 0;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.sl{font-size:11px;color:#8a8078;text-transform:uppercase;letter-spacing:.4px;font-weight:700}
.sb{padding:5px 10px;border:1.5px solid #ddd8d0;border-radius:6px;font-size:11px;font-weight:700;background:transparent;color:#8a8078;cursor:pointer;font-family:'Nunito',sans-serif}
.sb.on{background:#ddeeff;border-color:#4a9eff;color:#1a4f8a}
.list{max-width:820px;margin:0 auto;padding:14px 12px 32px}
.card{background:#fff;border-radius:10px;margin-bottom:8px;box-shadow:0 1px 8px rgba(28,24,20,.07);overflow:hidden}
.ch{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer}
.cid{font-size:15px;font-weight:900;color:#1c1814}
.cfac{font-size:12px;color:#8a8078;margin-top:2px;font-weight:600}

.dots{display:flex;gap:4px;margin-left:auto;align-items:center}
.dot{width:10px;height:10px;border-radius:50%}
.dg{background:#40c97a}.da{background:#f4c430}.dz{background:#ddd}
.cv{font-size:11px;color:#8a8078;margin-left:8px;transition:transform .2s}
.card.op .cv{transform:rotate(180deg)}
.cb{display:none;padding:0 16px 16px}
.card.op .cb{display:block}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.ci{padding:10px 12px;border-radius:8px;background:#f0ede8;border:1px solid transparent}
.ci.tut{border-color:#ddeeff;background:#ddeeff}
.ci-h{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.ci-n{font-size:10px;font-weight:800;color:#8a8078;text-transform:uppercase;letter-spacing:.4px}
.ci.tut .ci-n{color:#1a4f8a}
.ci-v{font-size:14px;font-weight:900}
.ci-b{background:rgba(0,0,0,.07);border-radius:99px;height:5px;overflow:hidden;margin-bottom:4px}
.ci-f{height:100%;border-radius:99px}
.fok{background:linear-gradient(90deg,#1e6b45,#40c97a)}
.fpr{background:linear-gradient(90deg,#8a6200,#f4c430)}
.ftu{background:linear-gradient(90deg,#1a4f8a,#4a9eff);opacity:.7}
.ci-t{font-size:10px;font-weight:600}
.foot{text-align:center;padding:12px;font-size:11px;color:#aaa;border-top:1px solid #ddd8d0;font-weight:600}
