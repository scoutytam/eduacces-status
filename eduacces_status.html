<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Nunito',sans-serif}
body{background:#f0ede8;color:#1c1814}

.logo{font-size:18px;font-weight:900;color:#fff}

.note{font-size:11px;color:#706050;text-align:right;line-height:1.6}
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);background:#fff;border-bottom:1px solid #ddd8d0}
.kpi{padding:14px 8px;text-align:center;border-right:1px solid #ddd8d0}
.kpi:last-child{border-right:none}
.kpi-n{font-size:28px;font-weight:900;line-height:1}
.kpi-l{font-size:10px;color:#8a8078;margin-top:3px;text-transform:uppercase;letter-spacing:.3px;font-weight:700}
.kpi-s{font-size:9px;color:#aaa;margin-top:1px}
.ctrl{padding:12px 16px;background:#fff;border-bottom:1px solid #ddd8d0;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sw{position:relative;flex:1;min-width:150px}
.si{width:100%;padding:8px 10px 8px 30px;border:1.5px solid #ddd8d0;border-radius:7px;font-size:14px;background:#f0ede8;font-family:'Nunito',sans-serif}
.si:focus{outline:none;border-color:#4a9eff}
.si-ic{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:13px;color:#8a8078}
.fsel{padding:8px 14px;border:1.5px solid #ddd8d0;border-radius:7px;font-size:13px;font-weight:600;background:#f0ede8;color:#1c1814;cursor:pointer;font-family:'Nunito',sans-serif;min-width:230px}
.fsel:focus{outline:none;border-color:#4a9eff}
.rc{font-size:12px;color:#8a8078;white-space:nowrap;font-weight:600}
.list{max-width:860px;margin:0 auto;padding:14px 12px 32px}
.card{background:#fff;border-radius:10px;margin-bottom:8px;box-shadow:0 1px 8px rgba(28,24,20,.07);overflow:hidden}
.ch{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer}
.cid{font-size:15px;font-weight:900;color:#1c1814}
.cfac{font-size:12px;color:#8a8078;margin-top:2px;font-weight:600}
.can{font-size:10px;background:#f0ede8;border:1px solid #ddd8d0;border-radius:12px;padding:2px 7px;color:#8a8078;margin-left:4px;font-weight:600}
.dots{display:flex;gap:4px;margin-left:auto;align-items:center}
.dot{width:10px;height:10px;border-radius:50%}
.dg{background:#40c97a}.da{background:#f4c430}.dz{background:#ddd}
.cv{font-size:11px;color:#8a8078;margin-left:8px;transition:transform .2s}
.card.op .cv{transform:rotate(180deg)}
.cb{display:none;padding:0 16px 16px}
.card.op .cb{display:block}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.cw{grid-column:1/-1;padding:12px 14px;border-radius:8px;background:#f0ede8}
.ci{padding:10px 12px;border-radius:8px;background:#f0ede8}
.ci-h{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.ci-n{font-size:10px;font-weight:800;color:#8a8078;text-transform:uppercase;letter-spacing:.4px}
.ci-v{font-size:14px;font-weight:900}
.ci-b{background:rgba(0,0,0,.07);border-radius:99px;height:5px;overflow:hidden;margin-bottom:4px}
.ci-f{height:100%;border-radius:99px}
.fok{background:linear-gradient(90deg,#1e6b45,#40c97a)}
.fpr{background:linear-gradient(90deg,#8a6200,#f4c430)}
.ci-t{font-size:10px;font-weight:600}
.trow{margin-top:6px;display:flex;flex-wrap:wrap;gap:5px}
.tp{font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;white-space:nowrap}
.tpok{background:#d6f0e3;color:#1e6b45;border:1px solid #a8dfc0}
.tppr{background:#fff4cc;color:#8a6200;border:1px solid #e8d070}
.foot{text-align:center;padding:12px;font-size:11px;color:#aaa;border-top:1px solid #ddd8d0;font-weight:600}

      +"<span style='font-size:10px;font-weight:600;color:#aaa'> /6 req</span></span></div>"
      +"<div class='ci-b'><div class='ci-f "+wfc+"' style='width:"+Math.round(wpct*100)+"%'></div></div>"
      +"<div class='ci-t' style='"+wns+"'>"+wnote+"</div>"
      +(pills?"<div class='trow'>"+pills+"</div>":"")
      +"</div>";
    var g_pct=s.grup_suport/2;if(g_pct>1)g_pct=1;
    var g_fc=s.gs_ok?"fok":s.grup_suport>0?"fpr":"";
    var g_ns=s.gs_ok?"color:#1e6b45;font-weight:700":s.grup_suport>0?"color:#8a6200":"color:#bbb";
    var g_note=s.gs_ok?"obiectiv atins":s.grup_suport>0?"in progres - mai raman "+(2-s.grup_suport):"nicio activitate";
    var gcard="<div class='ci'>"
      +"<div class='ci-h'><span class='ci-n'>Grup de suport</span>"
      +"<span class='ci-v' style='color:"+pcolor(s.grup_suport,2)+"'>"+s.grup_suport
      +"<span style='font-size:10px;font-weight:600;color:#aaa'>/2</span></span></div>"
      +"<div class='ci-b'><div class='ci-f "+g_fc+"' style='width:"+Math.round(g_pct*100)+"%'></div></div>"
      +"<div class='ci-t' style='"+g_ns+"'>"+g_note+"</div></div>";
    var c_pct=s.consiliere/2;if(c_pct>1)c_pct=1;
    var c_fc=s.con_ok?"fok":s.consiliere>0?"fpr":"";
    var c_ns=s.con_ok?"color:#1e6b45;font-weight:700":s.consiliere>0?"color:#8a6200":"color:#bbb";
    var c_note=s.con_ok?"obiectiv atins":s.consiliere>0?"in progres - mai raman "+(2-s.consiliere):"nicio activitate";
    var ccard="<div class='ci'>"
      +"<div class='ci-h'><span class='ci-n'>Consiliere</span>"
      +"<span class='ci-v' style='color:"+pcolor(s.consiliere,2)+"'>"+s.consiliere
      +"<span style='font-size:10px;font-weight:600;color:#aaa'>/2</span></span></div>"
      +"<div class='ci-b'><div class='ci-f "+c_fc+"' style='width:"+Math.round(c_pct*100)+"%'></div></div>"
      +"<div class='ci-t' style='"+c_ns+"'>"+c_note+"</div></div>";
    var m_pct=s.mentorat/2;if(m_pct>1)m_pct=1;
    var m_fc=s.men_ok?"fok":s.mentorat>0?"fpr":"";
    var m_ns=s.men_ok?"color:#1e6b45;font-weight:700":s.mentorat>0?"color:#8a6200":"color:#bbb";
    var m_note=s.men_ok?"obiectiv atins":s.mentorat>0?"in progres - mai raman "+(2-s.mentorat):"nicio activitate";
    var mcard="<div class='ci'>"
      +"<div class='ci-h'><span class='ci-n'>Mentorat</span>"
      +"<span class='ci-v' style='color:"+pcolor(s.mentorat,2)+"'>"+s.mentorat
      +"<span style='font-size:10px;font-weight:600;color:#aaa'>/2</span></span></div>"
      +"<div class='ci-b'><div class='ci-f "+m_fc+"' style='width:"+Math.round(m_pct*100)+"%'></div></div>"
      +"<div class='ci-t' style='"+m_ns+"'>"+m_note+"</div></div>";
    var t_pct=s.tutorat/8;if(t_pct>1)t_pct=1;
    var t_fc=s.tutorat>=8?"fok":s.tutorat>0?"fpr":"";
    var t_ns=s.tutorat>=8?"color:#1e6b45;font-weight:700":s.tutorat>0?"color:#8a6200":"color:#bbb";
    var t_note=s.tutorat>=8?"obiectiv atins":s.tutorat>0?"in progres - mai raman "+(8-s.tutorat):"nicio activitate";
    var tcard="<div class='ci'>"
      +"<div class='ci-h'><span class='ci-n'>Tutorat</span>"
      +"<span class='ci-v' style='color:"+pcolor(s.tutorat,8)+"'>"+s.tutorat
      +"<span style='font-size:10px;font-weight:600;color:#aaa'>/8</span></span></div>"
      +"<div class='ci-b'><div class='ci-f "+t_fc+"' style='width:"+Math.round(t_pct*100)+"%'></div></div>"
      +"<div class='ci-t' style='"+t_ns+"'>"+t_note+"</div></div>";
    h+="<div class='card' id='c"+s.id+"'>"
      +"<div class='ch' onclick='tog(\""+s.id+"\")'>" 
      +"<div style='flex:1;min-width:0'><div class='cid'>"+s.id+" <span class='can'>"+s.an_studiu+"</span></div>"
      +"<div class='cfac'>"+s.facultate+"</div></div>"
      +"<div class='dots'>"+dots+"</div><span class='cv'>&#9660;</span></div>"
      +"<div class='cb'><div class='cg'>"+wcard+gcard+ccard+mcard+tcard+"</div></div></div>";
  }
  document.getElementById("lst").innerHTML=h||"<div style='text-align:center;padding:40px;color:#aaa'>Niciun student gasit.</div>";
}
rnd();
</script>
